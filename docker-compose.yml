# Список сервисов (контейнеров) для запуска
services:
  # Имя нашего сервиса (контейнера)
  notion-frontend:

    # Настройки сборки образа
    build:
      context: .               # Папка с исходным кодом (текущая директория)
      dockerfile: Dockerfile   # Файл с инструкциями сборки

    # Проброс портов: [порт на твоей машине]:[порт внутри контейнера]
    ports:
      - "3000:3000"            # Открываем приложение на localhost:3000

    # Синхронизация файлов для hot-reload
    volumes:
      - .:/app                 # Монтируем локальный код в папку /app
      - /app/node_modules      # Исключаем node_modules (их ставит контейнер)
      - /app/.next             # Исключаем кэш сборки Next.js

    # Переменные окружения
    environment:
      - NODE_ENV=development   # Режим разработки
      - WATCHPACK_POLLING=true # Фикс для работы hot-reload в Docker

    # Автоперезапуск контейнера при падении (кроме ручной остановки)
    restart: unless-stopped
